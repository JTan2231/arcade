<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcade</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header id="app-header" class="app-header" hidden>
      <div>
        <h1>Arcade</h1>
        <p id="identity">Loading</p>
      </div>
      <div class="header-actions">
        <form id="profile-form" class="inline-form">
          <input id="display-name" name="display_name" placeholder="Display name" autocomplete="off">
          <button type="submit">Save</button>
        </form>
        <button id="logout" class="secondary" type="button">Logout</button>
      </div>
    </header>

    <main id="auth-view" class="auth-layout">
      <section class="panel auth-panel">
        <div class="auth-tabs" role="tablist" aria-label="Authentication">
          <button id="login-tab" class="auth-tab active" type="button">Login</button>
          <button id="signup-tab" class="auth-tab secondary" type="button">Signup</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input id="login-email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="login-password" type="password" autocomplete="current-password" required>
          </label>
          <label class="checkbox-row">
            <input id="login-remember" type="checkbox">
            Remember me
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="signup-form" class="auth-form" hidden>
          <label>
            Display name
            <input id="signup-display-name" autocomplete="name" maxlength="100" required>
          </label>
          <label>
            Email
            <input id="signup-email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="signup-password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label class="checkbox-row">
            <input id="signup-remember" type="checkbox">
            Remember me
          </label>
          <button type="submit">Create account</button>
        </form>

        <div id="auth-error" class="form-error" role="alert"></div>
      </section>
    </main>

    <main id="app-layout" class="layout" hidden>
      <section class="panel groups-panel">
        <div class="panel-header">
          <h2>Groups</h2>
          <button id="refresh" class="secondary" type="button">Refresh</button>
        </div>
        <form id="group-form" class="compact-form">
          <label>
            Name
            <input id="group-name" placeholder="Morning Dojo">
          </label>
          <button type="submit">Create group</button>
        </form>
        <div id="groups" class="stack"></div>
      </section>

      <section class="panel workspace-panel">
        <div id="group-workspace" class="stack"></div>
      </section>

      <section class="panel leaderboard-panel">
        <div class="panel-header">
          <h2>Leaderboard</h2>
          <select id="leaderboard-scope">
            <option value="global">Global</option>
            <option value="group">Selected group</option>
          </select>
        </div>
        <div id="leaderboard" class="stack"></div>
      </section>

      <section class="panel problems-panel">
        <div class="panel-header">
          <h2>Problems</h2>
        </div>
        <form id="problem-form" class="control-grid">
          <label>
            Source
            <select id="problem-source"></select>
          </label>
          <label>
            Tag
            <input id="problem-tag" placeholder="greedy">
          </label>
          <label>
            Min
            <input id="problem-min" type="number" step="100">
          </label>
          <label>
            Max
            <input id="problem-max" type="number" step="100">
          </label>
          <button type="submit">Filter</button>
        </form>
        <div id="problems" class="problem-list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Accounts</h2>
        </div>
        <form id="account-form" class="control-grid">
          <label>
            Source
            <select id="account-source"></select>
          </label>
          <label>
            Handle
            <input id="account-handle" placeholder="tourist">
          </label>
          <button type="submit">Link</button>
        </form>
        <div id="accounts" class="stack"></div>
      </section>
    </main>

    <div id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
