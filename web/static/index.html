<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Arcade</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header id="app-header" class="app-header" hidden>
      <div>
        <h1>Arcade</h1>
      </div>
      <button id="logout" class="secondary" type="button">Logout</button>
    </header>

    <main id="auth-view" class="auth-layout">
      <section class="panel auth-panel">
        <div class="auth-tabs" role="tablist" aria-label="Authentication">
          <button id="login-tab" class="auth-tab active" type="button">Login</button>
          <button id="signup-tab" class="auth-tab secondary" type="button">Signup</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            Email
            <input id="login-email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="login-password" type="password" autocomplete="current-password" required>
          </label>
          <label class="checkbox-row">
            <input id="login-remember" type="checkbox">
            Remember me
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="signup-form" class="auth-form" hidden>
          <label>
            Display name
            <input id="signup-display-name" autocomplete="name" maxlength="100" required>
          </label>
          <label>
            Email
            <input id="signup-email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input id="signup-password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label class="checkbox-row">
            <input id="signup-remember" type="checkbox">
            Remember me
          </label>
          <button type="submit">Create account</button>
        </form>

        <div id="auth-error" class="form-error" role="alert"></div>
      </section>
    </main>

    <main id="app-layout" class="layout group-layout" hidden>
      <section class="panel groups-panel">
        <div class="panel-header">
          <h2>Groups</h2>
        </div>
        <form id="group-form" class="compact-form">
          <label>
            Name
            <input id="group-name" placeholder="Morning Dojo" required>
          </label>
          <button type="submit">Create group</button>
        </form>
        <div id="groups" class="stack"></div>
      </section>
    </main>

    <div id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
