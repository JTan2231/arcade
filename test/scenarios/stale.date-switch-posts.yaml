name: keep selected date posts stable when old post requests finish

vars:
  email: date-switch-posts-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Date Switch Posts Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Date Switch Posts Dojo
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Date Switch Posts Source
        template: https://example.test/{slug}
        items:
          - title: Date Posts Task
            data:
              slug: date-posts-task
      expectStatus: 201
      capture:
        source_id: $.id

  - request:
      id: create_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Date Posts Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        feed_id: $.id

  - sql:
      statement: |
        update group_daily_feeds
        set created_at = '{{daysAgo:2}}T12:00:00.000Z'::timestamptz
        where id = '{{feed_id}}'::uuid

  - request:
      id: create_yesterday_post
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds/{{feed_id}}/outputs/{{yesterday}}/posts
      json:
        evidence_text: Yesterday evidence should stay hidden.
        caption: Yesterday caption should stay hidden.
      expectStatus: 201

steps:
  - visit: /

  - within: Feeds
    click:
      role: button
      name: Date Posts Practice

  - within: Selected feed output
    expectVisible:
      text: Date Posts Task

  - holdRequest:
      id: old-posts
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{yesterday}}/posts
      times: 1

  - holdRequest:
      id: new-posts
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{today}}/posts
      times: 1

  - within: Selected feed output
    select:
      label: Date
      exact: false
      value: "{{yesterday}}"

  - expectRequest:
      id: old-posts

  - within: Selected feed output
    select:
      label: Date
      exact: false
      value: "{{today}}"

  - expectRequest:
      id: new-posts

  - releaseRequest: new-posts

  - within: Posts
    expectVisible:
      text: There's nothing here...

  - releaseRequest: old-posts

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"

  - within: Posts
    expectHidden:
      text: Yesterday evidence should stay hidden.
