name: judged metric creation follows the progressive prompt flow

vars:
  email: judged-metric-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Judged Metric Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Judged Metric Group
      expectStatus: 201

steps:
  - visit: /

  - within: Groups
    click:
      role: button
      name: Add group

  - within: Groups
    click:
      role: button
      name: Group settings for Judged Metric Group

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Settings
    click:
      role: button
      name: Metrics

  - within: Metric settings
    click:
      role: button
      name: Add metric

  - within: Add metric
    click:
      role: button
      name: Judged

  - within: Add metric
    click:
      role: button
      name: Next

  - within: Add metric
    fill:
      label: Metric name
      value: Helpfulness

  - within: Add metric
    click:
      role: button
      name: Next

  - within: Add metric
    fill:
      label: Judging prompt
      value: How useful is this post to other group members?

  - within: Add metric
    click:
      role: button
      name: Next

  - within: Add metric
    select:
      label: Combine scores by
      value: average

  - within: Add metric
    click:
      role: button
      name: Add metric

  - expectStatus:
      text: Metric added

  - within: Metric settings
    expectVisible:
      text: Helpfulness

  - within: Metric settings
    expectHidden:
      text: How useful is this post to other group members?

  - within: Metric settings
    click:
      role: button
      name: Edit Helpfulness

  - within: Edit metric
    expectDisabled:
      role: button
      name: Judged

  - within: Edit metric
    expectValue:
      label: Metric name
      value: Helpfulness

  - within: Edit metric
    expectValue:
      label: Judging prompt
      value: How useful is this post to other group members?

  - within: Edit metric
    expectValue:
      label: Combine scores by
      value: average

  - within: Edit metric
    fill:
      label: Metric name
      value: ""

  - within: Edit metric
    select:
      label: Combine scores by
      value: max

  - within: Edit metric
    click:
      role: button
      name: Save metric

  - within: Edit metric
    expectAlert:
      text: Metric name is required

  - within: Edit metric
    fill:
      label: Metric name
      value: Practical value

  - within: Edit metric
    fill:
      label: Judging prompt
      value: How practical is this post for other group members?

  - within: Edit metric
    click:
      role: button
      name: Next

  - within: Edit metric
    click:
      role: button
      name: Save metric

  - expectStatus:
      text: Metric updated

  - within: Metric settings
    expectVisible:
      text: Practical value

  - within: Metric settings
    click:
      role: button
      name: Edit Practical value

  - within: Edit metric
    expectValue:
      label: Judging prompt
      value: How practical is this post for other group members?

  - within: Edit metric
    expectValue:
      label: Combine scores by
      value: max

  - within: Edit metric
    click:
      role: button
      name: Close
