name: add feed loads sources, previews, validates, and creates

vars:
  email: add-feed-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Add Feed Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Add Feed Dojo
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Add Feed Source
        template: https://example.test/{slug}
        items:
          - title: Alpha Warmup
            data:
              slug: alpha-warmup
          - title: Beta Warmup
            data:
              slug: beta-warmup
      expectStatus: 201
      capture:
        source_id: $.id

steps:
  - visit: /

  - holdRequest:
      id: sources
      method: GET
      path: /api/groups/*/catalog-sources
      times: 1

  - within: Feeds
    click:
      role: button
      name: Add feed

  - expectRequest:
      id: sources

  - within: Add feed
    expectDisabled:
      role: combobox
      name: Source

  - within: Add feed
    expectDisabled:
      role: button
      name: Create

  - releaseRequest: sources

  - within: Add feed
    expectEnabled:
      role: combobox
      name: Source

  - within: Add feed
    expectEnabled:
      role: button
      name: Create

  - within: Add feed
    click:
      role: button
      name: Preview

  - within: Add feed
    expectAlert:
      text: Name is required

  - within: Add feed
    fill:
      label: Name
      value: Warmup Practice

  - within: Add feed
    fill:
      label: Item count
      value: 1

  - within: Add feed
    click:
      role: button
      name: Preview

  - within: Preview
    expectVisible:
      text: 1 selected, 2 eligible

  - within: Add feed
    click:
      role: button
      name: Create

  - expectStatus:
      text: Feed created

  - within: Feeds
    expectPressed:
      role: button
      name: Warmup Practice
      pressed: true

  - within: Selected feed output
    expectVisible:
      text: Warmup Practice
