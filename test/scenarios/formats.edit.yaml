name: post format editing uses a prefilled wizard and publishes changed rules

vars:
  email: format-edit-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Format Edit Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Format Edit Group
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_format
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/evidence-formats
      json:
        slug: weekly-reflection
        name: Weekly reflection
        description: A short weekly reflection.
        min_chars: 12
        max_chars: 500
        min_lines: 2
        max_lines: 4
        line_min_chars: 3
        line_max_chars: 200
        allow_blank_lines: false
      expectStatus: 201
      capture:
        format_id: $.id

steps:
  - visit: /

  - within: Groups
    click:
      role: button
      name: Add group

  - within: Groups
    click:
      role: button
      name: Group settings for Format Edit Group

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Settings
    click:
      role: button
      name: Post formats

  - within: Post formats
    expectVisible:
      text: weekly-reflection · v1 · 12-500 chars · 2-4 lines · no blanks

  - within: Post formats
    expectHidden:
      role: textbox
      name: Name

  - within: Post formats
    click:
      role: button
      name: Edit Weekly reflection

  - within: Edit Weekly reflection
    expectValue:
      label: Name
      value: Weekly reflection

  - within: Edit Weekly reflection
    expectValue:
      label: Slug
      value: weekly-reflection

  - within: Edit Weekly reflection
    expectDisabled:
      role: textbox
      name: Slug

  - expectValue:
      label: Description
      value: A short weekly reflection.

  - within: Edit Weekly reflection
    fill:
      label: Name
      value: Weekly retrospective

  - fill:
      label: Description
      value: A guided weekly retrospective.

  - within: Edit Weekly reflection
    click:
      role: button
      name: Next

  - within: Edit Weekly reflection
    expectVisible:
      role: combobox
      name: Card palette

  - within: Edit Weekly reflection
    click:
      role: button
      name: Serif Fanwood Text

  - within: Edit Weekly reflection
    click:
      role: button
      name: Next

  - within: Edit Weekly reflection
    expectValue:
      label: Min chars
      value: 12

  - within: Edit Weekly reflection
    expectValue:
      label: Max chars
      value: 500

  - within: Edit Weekly reflection
    fill:
      label: Max chars
      value: 650

  - within: Edit Weekly reflection
    click:
      role: button
      name: Next

  - within: Edit Weekly reflection
    expectValue:
      label: Line count mode
      value: range

  - within: Edit Weekly reflection
    expectValue:
      label: Min lines
      value: 2

  - within: Edit Weekly reflection
    expectValue:
      label: Max lines
      value: 4

  - within: Edit Weekly reflection
    click:
      role: button
      name: Next

  - within: Edit Weekly reflection
    expectValue:
      label: Line min chars
      value: 3

  - within: Edit Weekly reflection
    expectValue:
      label: Line max chars
      value: 200

  - within: Edit Weekly reflection
    expectVisible:
      text: Changing constraints publishes a new immutable version.

  - within: Edit Weekly reflection
    click:
      role: button
      name: Publish version

  - expectStatus:
      text: Format rules updated

  - within: Post formats
    expectVisible:
      text: Weekly retrospective

  - within: Post formats
    expectVisible:
      text: weekly-reflection · v2 · 12-650 chars · 2-4 lines · no blanks

  - request:
      id: get_updated_format
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/evidence-formats/{{format_id}}
      expectStatus: 200
      expectJson:
        name: Weekly retrospective
        description: A guided weekly retrospective.
        content_typeface: serif
        active_version:
          version_number: 2
          min_chars: 12
          max_chars: 650
          min_lines: 2
          max_lines: 4
          line_min_chars: 3
          line_max_chars: 200
          allow_blank_lines: false

  - within: Post formats
    click:
      role: button
      name: Archive Weekly retrospective

  - within: Post formats
    expectVisible:
      text: Archived

  - within: Post formats
    expectVisible:
      role: button
      name: Edit Weekly retrospective

  - within: Post formats
    click:
      role: button
      name: Unarchive Weekly retrospective

  - within: Post formats
    expectHidden:
      text: Archived
