name: viewer theme selection stays hidden while preferences are dormant

vars:
  email: theme-viewer@example.test
  password: password123

before:
  - request:
      id: signup_viewer
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Theme Viewer
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Theme Group
      expectStatus: 201

steps:
  - visit: /

  - expectHidden:
      role: combobox
      name: Theme

  - request:
      client: browser
      method: PATCH
      path: /api/me
      json:
        theme_preference: light
      expectStatus: 200
      expectJson:
        theme_preference: light

  - visit: /

  - expectHidden:
      role: combobox
      name: Theme

  - request:
      client: browser
      method: POST
      path: /api/auth/logout
      json: {}
      expectStatus: 204

  - visit: /

  - expectHidden:
      role: combobox
      name: Theme
