name: public group feed and post URLs render signed out

vars:
  email: public-urls-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Public URLs Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Public URL Group
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Public URL Source
        template: https://example.test/{slug}
        items:
          - title: Visible Item
            data:
              slug: visible-item
      expectStatus: 201
      capture:
        source_id: $.id

  - request:
      id: create_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Public Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{source_id}}"
        item_count: 1
        schedule:
          starts_at: "{{today}}T00:00:00Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        feed_id: $.id

  - request:
      id: create_post
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds/{{feed_id}}/outputs/{{today}}/posts
      json:
        evidence_text: Public proof for the public page.
        caption: Shared for everyone.
      expectStatus: 201
      capture:
        post_id: $.id

  - request:
      id: create_private_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Private URL Group
        visibility: private
      expectStatus: 201
      capture:
        private_group_id: $.id

  - request:
      id: create_private_source
      client: browser
      method: POST
      path: /api/groups/{{private_group_id}}/catalog-sources
      json:
        name: Private URL Source
        template: https://example.test/{slug}
        items:
          - title: Hidden Item
            data:
              slug: hidden-item
      expectStatus: 201
      capture:
        private_source_id: $.id

  - request:
      id: create_private_feed
      client: browser
      method: POST
      path: /api/groups/{{private_group_id}}/daily-feeds
      json:
        name: Private Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{private_source_id}}"
        item_count: 1
        schedule:
          starts_at: "{{today}}T00:00:00Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        private_feed_id: $.id

  - request:
      id: create_private_post
      client: browser
      method: POST
      path: /api/groups/{{private_group_id}}/daily-feeds/{{private_feed_id}}/outputs/{{today}}/posts
      json:
        evidence_text: Private proof for members only.
      expectStatus: 201
      capture:
        private_post_id: $.id

  - request:
      id: logout_owner
      client: browser
      method: POST
      path: /api/auth/logout
      expectStatus: 204

steps:
  - request:
      id: public_group_api
      method: GET
      path: /api/public/groups/public-url-group
      expectStatus: 200
      expectJson:
        name: Public URL Group
        feeds:
          - name: Daily Thread
          - name: Public Practice

  - request:
      id: public_feed_api
      method: GET
      path: /api/public/feeds/{{feed_id}}/outputs/{{today}}
      expectStatus: 200
      expectJson:
        name: Public Practice
        items:
          - title: Visible Item
        posts:
          - evidence_text: Public proof for the public page.

  - request:
      id: public_post_api
      method: GET
      path: /api/public/posts/{{post_id}}
      expectStatus: 200
      expectJson:
        evidence_text: Public proof for the public page.
        feed:
          name: Public Practice

  - request:
      id: private_feed_api
      method: GET
      path: /api/public/feeds/{{private_feed_id}}/outputs/{{today}}
      expectStatus: 404

  - request:
      id: private_post_api
      method: GET
      path: /api/public/posts/{{private_post_id}}
      expectStatus: 404

  - visit: /g/public-url-group

  - within: Arcade workspace
    expectVisible:
      text: Public URL Group

  - within: Selected feed output
    expectVisible:
      text: Daily Thread

  - visit: /f/{{feed_id}}/{{today}}

  - within: Arcade workspace
    expectVisible:
      text: Public Practice

  - within: Selected feed output
    expectVisible:
      text: Visible Item

  - within: Posts
    expectVisible:
      text: Public proof for the public page.

  - within: Posts
    expectVisible:
      role: button
      name: Post

  - visit: /p/{{post_id}}

  - within: Selected feed output
    expectVisible:
      text: Public proof for the public page.

  - within: Posts
    expectVisible:
      text: Shared for everyone.

  - request:
      id: login_owner_again
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: member_post_route
      client: browser
      method: GET
      path: /api/me/feed-posts/{{post_id}}/route
      expectStatus: 200
      expectJson:
        group_id: "{{group_id}}"
        feed_id: "{{feed_id}}"
        feed_date: "{{today}}"

  - visit: /g/public-url-group

  - within: Groups
    expectVisible:
      text: Public URL Group

  - within: Posts
    expectVisible:
      role: button
      name: Post

  - visit: /p/{{post_id}}

  - within: Posts
    expectVisible:
      text: Public proof for the public page.

  - within: Posts
    click:
      role: button
      name: Post actions

  - within: Posts
    expectVisible:
      role: button
      name: Edit
