name: keep selected group stable when old feed requests finish

vars:
  email: switch-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Switch Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group_a
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Group A
      expectStatus: 201
      capture:
        group_a_id: $.id

  - request:
      id: create_group_b
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Group B
      expectStatus: 201
      capture:
        group_b_id: $.id

  - request:
      id: create_source_a
      client: browser
      method: POST
      path: /api/groups/{{group_a_id}}/catalog-sources
      json:
        name: Group A Source
        template: https://example.test/{slug}
        items:
          - title: Group A Task
            data:
              slug: group-a-task
      expectStatus: 201
      capture:
        source_a_id: $.id

  - request:
      id: create_source_b
      client: browser
      method: POST
      path: /api/groups/{{group_b_id}}/catalog-sources
      json:
        name: Group B Source
        template: https://example.test/{slug}
        items:
          - title: Group B Task
            data:
              slug: group-b-task
      expectStatus: 201
      capture:
        source_b_id: $.id

  - request:
      id: create_feed_a
      client: browser
      method: POST
      path: /api/groups/{{group_a_id}}/daily-feeds
      json:
        name: Group A Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{source_a_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        feed_a_id: $.id

  - request:
      id: create_feed_b
      client: browser
      method: POST
      path: /api/groups/{{group_b_id}}/daily-feeds
      json:
        name: Group B Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{source_b_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        feed_b_id: $.id

steps:
  - visit: /

  - within: Groups
    expectPressed:
      role: button
      name: Group B
      pressed: true

  - within: Feeds
    expectVisible:
      role: button
      name: Group B Practice

  - holdRequest:
      id: old-feeds
      method: GET
      path: /api/groups/*/daily-feeds
      times: 1

  - within: Groups
    click:
      role: button
      name: Group A

  - expectRequest:
      id: old-feeds

  - within: Groups
    click:
      role: button
      name: Group B

  - releaseRequest: old-feeds

  - within: Groups
    expectPressed:
      role: button
      name: Group B
      pressed: true

  - within: Feeds
    expectVisible:
      role: button
      name: Group B Practice

  - within: Selected feed output
    click:
      role: button
      name: Feed output choices

  - within: Feeds
    expectVisible:
      role: button
      name: Group A Practice
