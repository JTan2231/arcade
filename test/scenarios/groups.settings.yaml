name: group settings manages tags and members

vars:
  email: settings-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Settings Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Settings Group
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: add_member
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/members
      json:
        display_name: Member One
        role: member
        status: active
      expectStatus: 201

steps:
  - visit: /

  - within: Groups
    click:
      role: button
      name: Group settings for Settings Group

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Settings
    click:
      role: button
      name: Access

  - within: Group access
    select:
      label: Who can view and post?
      option: Private

  - expectStatus:
      text: Group access updated

  - request:
      id: private_group_public_read
      method: GET
      path: /api/public/groups/settings-group
      expectStatus: 404

  - within: Group access
    select:
      label: Who can view and post?
      option: Public

  - expectStatus:
      text: Group access updated

  - within: Settings
    click:
      role: button
      name: Members

  - within: Group members
    expectVisible:
      text: Member One

  - within: Settings
    click:
      role: button
      name: Post tags

  - within: Post tags
    click:
      role: button
      name: Add tag

  - within: Add tag
    fill:
      label: Tag name
      value: Milestone

  - within: Add tag
    click:
      role: button
      name: Add tag

  - expectStatus:
      text: Tag added

  - request:
      id: list_tags
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/post-tags?include_archived=true
      expectStatus: 200
      expectJson:
        - name: Milestone

  - within: Post tags
    expectHidden:
      role: textbox
      name: Tag name

  - within: Post tags
    click:
      role: button
      name: Edit Milestone

  - within: Edit tag
    expectValue:
      label: Tag name
      value: Milestone

  - within: Edit tag
    fill:
      label: Tag name
      value: Launch milestone

  - within: Edit tag
    click:
      role: button
      name: Save tag

  - expectStatus:
      text: Tag updated

  - request:
      id: list_updated_tags
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/post-tags?include_archived=true
      expectStatus: 200
      expectJson:
        - name: Launch milestone

  - within: Settings
    click:
      role: button
      name: Members

  - within: Group members
    click:
      role: button
      name: Remove Member One

  - expectStatus:
      text: Member removed

  - within: Group members
    expectHidden:
      text: Member One
