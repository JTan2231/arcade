name: keep selected feed posts stable when old post requests finish

vars:
  email: feed-switch-posts-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Feed Switch Posts Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Feed Switch Posts Dojo
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_old_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Feed Switch Posts Old Source
        template: https://example.test/{slug}
        items:
          - title: Posts Old Task
            data:
              slug: posts-old-task
      expectStatus: 201
      capture:
        old_source_id: $.id

  - request:
      id: create_new_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Feed Switch Posts New Source
        template: https://example.test/{slug}
        items:
          - title: Posts New Task
            data:
              slug: posts-new-task
      expectStatus: 201
      capture:
        new_source_id: $.id

  - request:
      id: create_old_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Post Old Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{old_source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        old_feed_id: $.id

  - request:
      id: create_new_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Post New Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{new_source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        new_feed_id: $.id

  - request:
      id: get_old_feed_today
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/daily-feeds/{{old_feed_id}}/today
      expectStatus: 200
      capture:
        feed_date: $.date

  - request:
      id: create_old_feed_post
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds/{{old_feed_id}}/outputs/{{feed_date}}/posts
      json:
        evidence_kind: text
        evidence_text: Old feed evidence should stay hidden.
        caption: Old feed caption should stay hidden.
      expectStatus: 201

steps:
  - visit: /

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"

  - holdRequest:
      id: old-posts
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{feed_date}}/posts
      times: 1

  - holdRequest:
      id: new-posts
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{feed_date}}/posts
      times: 1

  - within: Feeds
    click:
      role: button
      name: Post Old Practice

  - expectRequest:
      id: old-posts

  - within: Feeds
    click:
      role: button
      name: Post New Practice

  - expectRequest:
      id: new-posts

  - releaseRequest: new-posts

  - within: Selected feed output
    expectVisible:
      text: Posts New Task

  - within: Posts
    expectVisible:
      text: No posts yet.

  - releaseRequest: old-posts

  - within: Selected feed output
    expectVisible:
      text: Posts New Task

  - within: Posts
    expectHidden:
      text: Old feed evidence should stay hidden.
