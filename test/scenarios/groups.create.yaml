name: signup and create a group

steps:
  - visit: /

  - within: Authentication
    click:
      role: tab
      name: Signup

  - within: Authentication
    fill:
      label: Username
      value: Group Owner

  - within: Authentication
    fill:
      label: Password
      value: password123

  - within: Authentication
    click:
      role: button
      name: Create account

  - within: Groups
    click:
      role: button
      name: Add group

  - within: Groups
    fill:
      label: New group name
      value: Morning Dojo First

  - within: Groups
    click:
      role: button
      name: Create group

  - expectStatus:
      text: Group created

  - within: Groups
    expectPressed:
      role: button
      name: Morning Dojo First
      pressed: true

  - within: Groups
    click:
      role: button
      name: Add group

  - within: Groups
    fill:
      label: New group name
      value: Morning Dojo Preferred

  - within: Groups
    click:
      role: button
      name: Create group

  - expectStatus:
      text: Group created

  - within: Groups
    expectPressed:
      role: button
      name: Morning Dojo Preferred
      pressed: true

  - within: Groups
    expectPressed:
      role: button
      name: Morning Dojo First
      pressed: false

  - within: Feeds
    expectVisible:
      role: button
      name: Daily Thread

  - within: Groups
    click:
      role: button
      name: Group settings for Morning Dojo Preferred

  - within: Groups
    expectVisible:
      role: button
      name: Delete
