name: login and logout through the authentication panel

vars:
  email: login-user@example.test
  password: password123

before:
  - request:
      id: signup_user
      method: POST
      path: /api/auth/signup
      json:
        display_name: Login User
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        user_id: $.id

steps:
  - visit: /

  - within: Authentication
    fill:
      label: Email
      value: "{{email}}"

  - within: Authentication
    fill:
      label: Password
      value: "{{password}}"

  - within: Authentication
    click:
      role: button
      name: Login

  - expectStatus:
      text: Signed in

  - within: Arcade workspace
    expectVisible:
      role: button
      name: Add group

  - click:
      role: button
      name: Logout

  - expectStatus:
      text: Signed out

  - within: Authentication
    expectVisible:
      role: button
      name: Login
