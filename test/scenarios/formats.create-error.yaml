name: post format creation retains its draft after an API error

vars:
  email: format-error-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Format Error Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Format Error Group
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_existing_format
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/evidence-formats
      json:
        slug: retry-format
        name: Existing format
        min_chars: 1
        allow_blank_lines: true
      expectStatus: 201

steps:
  - visit: /

  - within: Groups
    click:
      role: button
      name: Add group

  - within: Groups
    click:
      role: button
      name: Group settings for Format Error Group

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Evidence formats
    click:
      role: button
      name: Add format

  - within: Add format
    fill:
      label: Name
      value: Retry format

  - within: Add format
    fill:
      label: Slug
      value: retry-format

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    fill:
      label: Line max chars
      value: 120

  - within: Add format
    click:
      role: button
      name: Add format

  - within: Add format
    expectAlert:
      text: evidence format slug already exists

  - within: Add format
    expectValue:
      label: Name
      value: Retry format

  - within: Add format
    expectValue:
      label: Line max chars
      value: 120

  - within: Add format
    expectEnabled:
      role: button
      name: Add format

  - within: Add format
    fill:
      label: Slug
      value: retry-format-new

  - within: Add format
    expectHidden:
      text: evidence format slug already exists

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    click:
      role: button
      name: Next

  - within: Add format
    click:
      role: button
      name: Add format

  - expectStatus:
      text: Format added

  - within: Evidence formats
    expectVisible:
      text: Retry format

  - within: Evidence formats
    expectVisible:
      text: retry-format-new
