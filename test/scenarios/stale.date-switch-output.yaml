name: keep selected date stable when old output requests finish

vars:
  email: date-switch-output-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Date Switch Output Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Date Switch Output Dojo
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Date Switch Output Source
        template: https://example.test/{slug}
        items:
          - title: Date Output Task
            data:
              slug: date-output-task
      expectStatus: 201
      capture:
        source_id: $.id

  - request:
      id: create_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Date Output Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        feed_id: $.id

  - sql:
      statement: |
        update group_daily_feeds
        set created_at = '{{daysAgo:2}}T12:00:00.000Z'::timestamptz
        where id = '{{feed_id}}'::uuid

  - request:
      id: create_metric
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds/{{feed_id}}/metrics
      json:
        system_key: post_count
        display_name: Date output posts
        aggregation: count
      expectStatus: 201

  - request:
      id: create_today_post
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds/{{feed_id}}/outputs/{{today}}/posts
      json:
        evidence_text: Today evidence keeps the leaderboard populated.
      expectStatus: 201

steps:
  - visit: /

  - within: Feeds
    click:
      role: button
      name: Date Output Practice

  - within: Selected feed output
    expectVisible:
      text: Date Output Task

  - within: Metrics
    expectVisible:
      text: Posts
      exact: true

  - holdRequest:
      id: member-route-resolution
      method: GET
      path: /api/me/daily-feeds
      times: 1

  - holdRequest:
      id: older-output
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{daysAgo:2}}
      times: 1

  - holdRequest:
      id: old-output
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{yesterday}}
      times: 1

  - holdRequest:
      id: new-output
      method: GET
      path: /api/groups/*/daily-feeds/*/outputs/{{today}}
      times: 1

  - holdRequest:
      id: leaderboard-reload
      method: GET
      path: /api/groups/*/daily-feeds/*/metrics/*/leaderboard
      times: 1

  - within: Selected feed output
    select:
      label: Date
      exact: false
      value: "{{daysAgo:2}}"

  - expectRequest:
      id: older-output

  - releaseRequest: older-output

  - wait:
      milliseconds: 250

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{daysAgo:2}}"

  - within: Metrics
    expectVisible:
      text: Posts
      exact: true

  - within: Selected feed output
    select:
      label: Date
      exact: false
      value: "{{yesterday}}"

  - expectRequest:
      id: old-output

  - within: Groups
    expectVisible:
      text: Date Switch Output Dojo

  - within: Feeds
    expectPressed:
      role: button
      name: Date Output Practice
      pressed: true

  - within: Metrics
    expectVisible:
      text: Posts
      exact: true

  - within: Selected feed output
    select:
      label: Date
      exact: false
      value: "{{today}}"

  - expectRequest:
      id: new-output

  - releaseRequest: new-output

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"

  - releaseRequest: old-output

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"
