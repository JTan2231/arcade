name: friend request enables group invite

vars:
  alice_email: friends-alice@example.test
  bob_email: friends-bob@example.test
  password: password123

before:
  - request:
      id: signup_alice
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Alice Friend
        email: "{{alice_email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        alice_id: $.id

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Friends Invite Group
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: signup_bob
      method: POST
      path: /api/auth/signup
      json:
        display_name: Bob Friend
        email: "{{bob_email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        bob_id: $.id
        bob_friend_code: $.friend_code

  - request:
      id: send_friend_request
      client: browser
      method: POST
      path: /api/friend-requests
      json:
        friend_code: "{{bob_friend_code}}"
      expectStatus: 201
      capture:
        friend_request_id: $.id

  - request:
      id: accept_friend_request
      method: POST
      path: /api/friend-requests/{{friend_request_id}}/accept
      json: {}
      expectStatus: 200
      expectJson:
        status: accepted

steps:
  - visit: /

  - within: Friends
    expectVisible:
      text: Bob Friend

  - within: Feeds
    expectVisible:
      text: Bob Friend

  - within: Feeds
    click:
      role: button
      name: Invite

  - expectStatus:
      text: Group invite sent

  - request:
      id: list_bob_group_invites
      method: GET
      path: /api/group-invites
      expectStatus: 200
      expectJson:
        - group:
            id: "{{group_id}}"
            name: Friends Invite Group
          invited_by:
            id: "{{alice_id}}"

  - request:
      id: accept_group_invite
      method: POST
      path: /api/groups/{{group_id}}/invites/{{bob_id}}/accept
      json: {}
      expectStatus: 200
      expectJson:
        id: "{{group_id}}"
        my_status: active

  - request:
      id: list_bob_groups
      method: GET
      path: /api/groups
      expectStatus: 200
      expectJson:
        - id: "{{group_id}}"
          my_status: active
