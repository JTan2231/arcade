name: custom palette and serif format render long wrapping posts

vars:
  email: appearance-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      client: browser
      method: POST
      path: /api/auth/signup
      json:
        display_name: Appearance Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Appearance Studio
      expectStatus: 201
      capture:
        group_id: $.id

steps:
  - visit: /

  - within: Groups
    click:
      role: button
      name: Group settings for Appearance Studio

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Settings
    click:
      role: button
      name: Card palettes

  - within: Card palettes
    click:
      role: button
      name: Duplicate Chalkboard

  - within: Add card palette
    fill:
      label: Name
      value: Sky paper

  - within: Add card palette
    fill:
      label: Surface hue
      value: 210

  - within: Add card palette
    fill:
      label: Surface color intensity
      value: 72

  - within: Add card palette
    click:
      role: button
      name: Follow surface

  - within: Add card palette
    click:
      role: button
      name: Add palette

  - within: Card palettes
    expectVisible:
      text: Sky paper

  - within: Settings
    click:
      role: button
      name: Post formats

  - within: Post formats
    click:
      role: button
      name: Edit Plain text

  - within: Edit Plain text
    click:
      role: button
      name: Serif Fanwood Text

  - within: Edit Plain text
    expectPressed:
      role: button
      name: Serif Fanwood Text
      pressed: true

  - select:
      label: Card palette
      option: Sky paper

  - within: Edit Plain text
    click:
      role: button
      name: Next

  - within: Edit Plain text
    click:
      role: button
      name: Next

  - within: Edit Plain text
    click:
      role: button
      name: Next

  - within: Edit Plain text
    click:
      role: button
      name: Save format

  - expectStatus:
      text: Format updated

  - request:
      id: verify_format_appearance
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/evidence-formats?include_archived=true
      expectStatus: 200
      expectJson:
        - name: Plain text
          content_typeface: serif
          content_card_palette:
            name: Sky paper
            material_intent:
              model: arcade-pigment-v1
              surface_hue: 210
              surface_colorfulness: 72

  - within: Settings
    click:
      role: button
      name: Close

  - within: Feeds
    click:
      role: button
      name: Daily Thread

  - within: Posts
    click:
      role: button
      name: Post

  - wait: 100

  - within: Posts
    fill:
      label: Content
      value: >-
        Today I slowed down long enough to describe the shape of the problem before trying to solve it. I compared the obvious route with the quieter route, wrote down what each assumption would cost, and noticed that the useful invariant had been present from the beginning. From there the implementation became a sequence of small promises: preserve the ordering, keep every transition observable, make the empty case unsurprising, and leave enough room for tomorrow's version to remain legible. I checked the result against awkward inputs, narrow screens, interrupted sessions, and the temptation to hide complexity behind a clever name. The final answer was not shorter because detail disappeared; it was shorter because each detail finally had a place. I recorded the failed approaches too, since they explain why the stable path is shaped this way and give the next person something firmer than confidence to work from.

  - within: Posts
    click:
      role: button
      name: Submit

  - expectStatus:
      text: Post submitted

  - wait: 1000

  - within: Posts
    expectVisible:
      role: button
      name: Expand content

  - within: Posts
    click:
      role: button
      name: Expand content

  - wait: 1300

  - within: Posts
    expectVisible:
      role: button
      name: Collapse content

  - within: Posts
    click:
      role: button
      name: Collapse content

  - wait: 1300

  - within: Groups
    click:
      role: button
      name: Group settings for Appearance Studio

  - within: Groups
    click:
      role: button
      name: Settings

  - within: Settings
    click:
      role: button
      name: Card palettes

  - within: Card palettes
    click:
      role: button
      name: Edit Sky paper

  - within: Edit Sky paper
    expectVisible:
      text: Used by 1 active format

  - within: Edit Sky paper
    fill:
      label: Surface hue
      value: 28

  - within: Edit Sky paper
    click:
      role: button
      name: Save palette

  - request:
      id: verify_live_palette_revision
      client: browser
      method: GET
      path: /api/groups/{{group_id}}/post-card-palettes?include_archived=true
      expectStatus: 200
      expectJson:
        - name: Chalkboard
        - name: Sky paper
          material_intent:
            model: arcade-pigment-v1
            surface_hue: 28
            surface_colorfulness: 72

  - within: Settings
    click:
      role: button
      name: Close

  - within: Posts
    expectVisible:
      text: Today I slowed down long enough

  - within: Posts
    expectVisible:
      role: button
      name: Expand content
