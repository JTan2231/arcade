name: keep selected feed output stable when old output requests finish

vars:
  email: feed-switch-output-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Feed Switch Output Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Feed Switch Output Dojo
      expectStatus: 201
      capture:
        group_id: $.id

  - request:
      id: create_old_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Feed Switch Output Old Source
        template: https://example.test/{slug}
        items:
          - title: Output Old Task
            data:
              slug: output-old-task
      expectStatus: 201
      capture:
        old_source_id: $.id

  - request:
      id: create_new_source
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/catalog-sources
      json:
        name: Feed Switch Output New Source
        template: https://example.test/{slug}
        items:
          - title: Output New Task
            data:
              slug: output-new-task
      expectStatus: 201
      capture:
        new_source_id: $.id

  - request:
      id: create_old_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Output Old Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{old_source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        old_feed_id: $.id

  - request:
      id: create_new_feed
      client: browser
      method: POST
      path: /api/groups/{{group_id}}/daily-feeds
      json:
        name: Output New Practice
        kind: catalog_daily
        enabled: true
        source_id: "{{new_source_id}}"
        item_count: 1
        filters: []
        schedule:
          starts_at: "2020-01-01T00:00:00.000Z"
          timezone: UTC
          interval_seconds: 86400
      expectStatus: 201
      capture:
        new_feed_id: $.id

steps:
  - visit: /

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"

  - holdRequest:
      id: old-output
      method: GET
      path: /api/groups/*/daily-feeds/*/today
      times: 1

  - holdRequest:
      id: new-output
      method: GET
      path: /api/groups/*/daily-feeds/*/today
      times: 1

  - within: Feeds
    click:
      role: button
      name: Output Old Practice

  - expectRequest:
      id: old-output

  - within: Feeds
    click:
      role: button
      name: Output New Practice

  - expectRequest:
      id: new-output

  - releaseRequest: new-output

  - within: Selected feed output
    expectVisible:
      text: Output New Task

  - releaseRequest: old-output

  - within: Selected feed output
    expectVisible:
      text: Output New Task

  - within: Selected feed output
    expectHidden:
      text: Output Old Task
