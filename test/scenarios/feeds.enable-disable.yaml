name: feed enable and disable updates the selected feed

vars:
  email: toggle-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Toggle Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Toggle Dojo
      expectStatus: 201
      capture:
        group_id: $.id

steps:
  - visit: /

  - within: Selected feed output
    expectValue:
      label: Date
      exact: false
      value: "{{today}}"

  - within: Feeds
    click:
      role: button
      name: Feed settings for Daily Thread

  - within: Feeds
    expectVisible:
      role: button
      name: Settings

  - within: Feeds
    expectVisible:
      role: button
      name: Copy link

  - within: Feeds
    click:
      role: button
      name: Settings

  - within: Feed settings
    click:
      role: button
      name: Disable

  - expectStatus:
      text: Feed disabled

  - within: Feeds
    expectVisible:
      text: Disabled

  - within: Posts
    expectDisabled:
      role: button
      name: Post

  - within: Feeds
    click:
      role: button
      name: Feed settings for Daily Thread

  - within: Feeds
    click:
      role: button
      name: Settings

  - within: Feed settings
    click:
      role: button
      name: Enable

  - expectStatus:
      text: Feed enabled

  - within: Feeds
    expectHidden:
      text: Disabled

  - within: Posts
    expectEnabled:
      role: button
      name: Post
