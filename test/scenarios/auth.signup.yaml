name: signup through the authentication panel

steps:
  - visit: /

  - within: Authentication
    click:
      role: tab
      name: Signup

  - within: Authentication
    fill:
      label: Username
      value: Ada Lovelace

  - within: Authentication
    fill:
      label: Password
      value: password123

  - within: Authentication
    click:
      role: button
      name: Create account

  - expectStatus:
      text: Account created

  - within: Arcade workspace
    expectVisible:
      role: button
      name: Add group
