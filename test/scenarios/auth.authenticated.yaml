name: fresh authenticated load opens the workspace

vars:
  email: fresh-auth@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Fresh Auth User
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Fresh Auth Group
      expectStatus: 201
      capture:
        group_id: $.id

steps:
  - visit: /

  - within: Arcade workspace
    expectVisible:
      text: Fresh Auth Group

  - within: Groups
    expectPressed:
      role: button
      name: Fresh Auth Group
      pressed: true

  - within: Feeds
    expectVisible:
      role: button
      name: Daily Thread
