name: add feed reports source loading errors

vars:
  email: add-feed-error-owner@example.test
  password: password123

before:
  - request:
      id: signup_owner
      method: POST
      path: /api/auth/signup
      json:
        display_name: Add Feed Error Owner
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 201
      capture:
        owner_id: $.id

  - request:
      id: login_owner
      client: browser
      method: POST
      path: /api/auth/login
      json:
        email: "{{email}}"
        password: "{{password}}"
        remember_me: false
      expectStatus: 200

  - request:
      id: create_group
      client: browser
      method: POST
      path: /api/groups
      json:
        name: Add Feed Error Dojo
      expectStatus: 201
      capture:
        group_id: $.id

steps:
  - fulfillRequest:
      method: GET
      path: /api/groups/*/catalog-sources
      status: 500
      json:
        error: Catalog source load failed

  - visit: /

  - within: Feeds
    click:
      role: button
      name: Add feed

  - within: Add feed
    expectAlert:
      text: Catalog source load failed

  - within: Add feed
    fill:
      label: Name
      value: Unavailable practice

  - within: Add feed
    expectAlert:
      text: Catalog source load failed

  - within: Add feed
    click:
      role: button
      name: Next

  - within: Add feed
    click:
      role: button
      name: Next

  - within: Add feed
    expectDisabled:
      role: combobox
      name: Source

  - within: Add feed
    expectDisabled:
      role: button
      name: Next

  - within: Add feed
    click:
      role: button
      name: Close
